<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 알리미 - 메세지</title>
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>
  <header class="app-header">
    <h1 onclick="location.href='calendar.html'">과제 알리미</h1>
    <nav>
      <a href="calendar.html">날짜화면</a>
      <a href="register.html">과제등록</a>
      <a href="messages.html" class="active">메세지</a>
      <a href="settings.html">설정</a>
    </nav>
    <div class="user-info">
      <div class="notification-area">
        <button class="notification-btn" id="notificationBtn" type="button">알림 <span class="notification-badge" id="notificationBadge">0</span></button>
        <div class="notification-panel" id="notificationPanel">
          <div class="notification-panel-header">
            <strong>최근 알림</strong>
            <button class="notification-refresh-btn" id="notificationRefreshBtn" type="button">새로고침</button>
          </div>
          <div class="notification-list" id="notificationList">
            <div class="notification-empty">불러오는 중...</div>
          </div>
        </div>
      </div>
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" onclick="API.logout()">로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="stats" style="margin-bottom:15px">
      <div class="stat-card urgent" id="showGradeMsg" style="cursor:pointer"><div class="num">📢</div><div class="label">학년 메세지</div></div>
      <div class="stat-card normal" id="showClassMsg" style="cursor:pointer"><div class="num">💬</div><div class="label">반 메세지</div></div>
    </div>

    <div class="card">
      <h3 id="messageTitle">전체 메세지</h3>

      <div class="message-form">
        <select id="msgType" style="padding:10px;border:1px solid #ddd;border-radius:8px;font-size:0.95rem">
          <option value="grade">학년 공지</option>
          <option value="class">반 알림장</option>
        </select>
        <textarea id="msgContent" placeholder="메세지를 입력하세요..." rows="2"></textarea>
        <button class="btn btn-primary btn-sm" id="sendMsgBtn">보내기</button>
      </div>

      <div id="messageList"><div class="empty-state">메세지가 없습니다.</div></div>
    </div>
  </div>

  <script src="js/api.js?v=5"></script>
  <script>
    let filterType = 'grade';
    let messages = [];

    API.requireAuth();

    async function init() {
      const user = await API.ensureUser();
      if (!user) return;
      await API.loadUserInfo();
      await API.initNotifications();
      await loadMessages();
    }

    async function loadMessages() {
      const user = API.getUser();
      if (!user) return;
      const data = await API.getMessages(user.grade, user.class_number, filterType);
      if (data) messages = data;
      renderMessages();
    }

    function renderMessages() {
      const user = API.getUser();
      document.getElementById('messageTitle').textContent =
        filterType === 'grade'
          ? `📢 학년 메세지${user ? ' (' + user.grade + '학년)' : ''}`
          : `💬 반 메세지${user ? ' (' + user.grade + '학년 ' + user.class_number + '반)' : ''}`;

      document.getElementById('msgType').value = filterType;
      document.getElementById('showGradeMsg').classList.toggle('active', filterType === 'grade');
      document.getElementById('showClassMsg').classList.toggle('active', filterType === 'class');

      const container = document.getElementById('messageList');
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-state">메세지가 없습니다.</div>';
        return;
      }
      container.innerHTML = messages.map(m => {
        const badge = m.type === 'grade' ? '<span class="msg-badge grade">학년</span>' : '<span class="msg-badge class">반</span>';
        const time = new Date(m.created_at).toLocaleString('ko-KR');
        const canDelete = user && Number(m.sender_id) === Number(user.id);
        return `<div class="message-item">
          <div class="msg-header">
            <span class="msg-sender">${API.escapeHTML(m.sender_name)} ${badge}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-content">${API.escapeHTML(m.content)}</div>
          ${canDelete ? `<div class="actions" style="margin-top:10px"><button class="btn btn-danger btn-sm delete-message" data-id="${m.message_id}">삭제</button></div>` : ''}
        </div>`;
      }).join('');
    }

    document.getElementById('sendMsgBtn').addEventListener('click', async () => {
      const content = document.getElementById('msgContent').value.trim();
      const type = document.getElementById('msgType').value;
      const user = API.getUser();
      if (!content) { alert('내용을 입력해주세요.'); return; }
      if (!user) { alert('로그인이 필요합니다.'); return; }

      const res = await API.sendMessage({ content, type });
      if (res && res.success) {
        document.getElementById('msgContent').value = '';
        await loadMessages();
        await API.refreshNotifications();
      } else {
        alert('전송에 실패했습니다.');
      }
    });

    document.getElementById('messageList').addEventListener('click', async (e) => {
      if (!e.target.classList.contains('delete-message')) return;
      if (!confirm('정말 삭제하시겠습니까?')) return;
      const res = await API.deleteMessage(parseInt(e.target.dataset.id));
      if (!res || !res.success) { alert(res?.error || '삭제에 실패했습니다.'); return; }
      await loadMessages();
      await API.refreshNotifications();
    });

    document.getElementById('msgType').addEventListener('change', async (e) => {
      filterType = e.target.value;
      await loadMessages();
    });

    document.getElementById('showGradeMsg').addEventListener('click', async () => {
      if (filterType === 'grade') return;
      filterType = 'grade';
      await loadMessages();
    });

    document.getElementById('showClassMsg').addEventListener('click', async () => {
      if (filterType === 'class') return;
      filterType = 'class';
      await loadMessages();
    });

    init();
  </script>
</body>
</html>
