<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 알리미 - 메세지</title>
  <script src="js/theme-init.js?v=1"></script>
  <link rel="stylesheet" href="css/style.css?v=27">
</head>
<body>
  <div class="app-shell">
  <header class="app-header">
    <h1 data-nav="calendar.html">과제 알리미</h1>
    <nav>
      <a href="calendar.html">날짜화면</a>
      <a href="register.html">과제등록</a>
      <a href="messages.html" class="active">메세지</a>
      <a href="chatbot.html">AI 챗봇</a>
      <a href="settings.html">설정</a>
    </nav>
    <div class="user-info">
      <div class="notification-area">
        <button class="notification-btn" id="notificationBtn" type="button">알림 <span class="notification-badge" id="notificationBadge">0</span></button>
        <div class="notification-panel" id="notificationPanel">
          <div class="notification-panel-header">
            <strong>최근 알림</strong>
            <button class="notification-refresh-btn" id="notificationRefreshBtn" type="button">새로고침</button>
          </div>
          <div class="notification-list" id="notificationList">
            <div class="notification-empty">불러오는 중...</div>
          </div>
        </div>
      </div>
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" type="button" data-logout>로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="stats" style="margin-bottom:15px">
      <div class="stat-card urgent" id="showGradeMsg" style="cursor:pointer"><div class="num">📢</div><div class="label">학년 공지</div></div>
      <div class="stat-card normal" id="showClassMsg" style="cursor:pointer"><div class="num">💬</div><div class="label">반 공지</div></div>
    </div>

    <div class="card">
      <h3 id="messageTitle">전체 공지</h3>

      <div class="message-form" id="messageForm">
        <select id="msgType" class="message-target-select">
          <option value="grade">학년 공지</option>
          <option value="class">반 공지</option>
        </select>
        <select id="msgTargetGrade" class="message-target-select" style="display:none"></select>
        <select id="msgTargetClass" class="message-target-select" style="display:none"></select>
        <textarea id="msgContent" placeholder="공지를 입력하세요..." rows="2"></textarea>
        <button class="btn btn-primary btn-sm" id="sendMsgBtn">보내기</button>
      </div>
      <div id="messageList"><div class="empty-state">메세지가 없습니다.</div></div>
    </div>
  </div>
  </div>

  <script src="js/api.js?v=16"></script>
  <script src="js/app-shell.js?v=1"></script>
  <script src="js/messages.js?v=1"></script>
</body>
</html>
