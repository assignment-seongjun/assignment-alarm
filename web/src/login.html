<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 알리미 - 로그인</title>
  <link rel="stylesheet" href="css/style.css?v=15">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
</head>
<body class="login-page">
  <div class="app-shell">
  <div class="auth-page">
    <div class="auth-box">
      <h1>과제 알리미</h1>
      <p>과제를 놓치지 말고 확인하세요!</p>

      <div class="auth-error" id="authError"></div>

      <div id="loginForm">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="loginName" placeholder="이름">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="loginPassword" placeholder="비밀번호">
        </div>
        <button class="btn btn-primary" style="width:100%" id="loginBtn">로그인</button>
        <div class="auth-divider" id="googleDivider" style="display:none"><span>또는</span></div>
        <div id="googleLoginBox" style="display:none">
          <div id="googleLoginButton" class="google-login-button"></div>
          <div class="auth-link" id="googleDomainHint" style="display:none; margin-top:10px;">@bssm.hs.kr 학교 계정만 사용할 수 있습니다.</div>
        </div>
        <div class="auth-link">계정이 없으신가요? <a id="goToRegister">회원가입</a></div>
      </div>

      <div id="registerForm" style="display:none">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="regName" placeholder="이름">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="regPassword" placeholder="비밀번호">
        </div>
        <div class="form-group">
          <label>비밀번호 확인</label>
          <input type="password" id="regPasswordConfirm" placeholder="비밀번호 확인">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>학년</label>
            <select id="regGrade">
              <option value="1">1학년</option>
              <option value="2">2학년</option>
              <option value="3">3학년</option>
            </select>
          </div>
          <div class="form-group">
            <label>반</label>
            <select id="regClass">
              <option value="1">1반</option>
              <option value="2">2반</option>
              <option value="3">3반</option>
              <option value="4">4반</option>
            </select>
          </div>
        </div>
        <div class="turnstile-wrap" id="turnstileWrap">
          <div id="turnstileWidget"></div>
        </div>
        <button class="btn btn-primary" style="width:100%" id="registerBtn">회원가입</button>
        <div class="auth-link">이미 계정이 있으신가요? <a id="goToLogin">로그인</a></div>
      </div>

      <div id="googleProfileForm" style="display:none">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="googleProfileName" readonly>
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="text" id="googleProfileEmail" readonly>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>학년</label>
            <select id="googleGrade">
              <option value="1">1학년</option>
              <option value="2">2학년</option>
              <option value="3">3학년</option>
            </select>
          </div>
          <div class="form-group">
            <label>반</label>
            <select id="googleClass">
              <option value="1">1반</option>
              <option value="2">2반</option>
              <option value="3">3반</option>
              <option value="4">4반</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%" id="googleProfileBtn">시작하기</button>
        <div class="auth-link"><a id="cancelGoogleSetup">다시 로그인 선택으로 돌아가기</a></div>
      </div>
    </div>
  </div>
  </div>

  <script src="js/api.js?v=8"></script>
  <script>
    let turnstileSiteKey = null;
    let turnstileWidgetId = null;
    let googleClientId = null;
    let googleSetupToken = null;
    let googleButtonRendered = false;

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('authError').style.display = 'none';
    }

    function showRegisterForm() {
      hideError();
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('googleProfileForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      renderTurnstileIfNeeded();
    }

    function showLoginForm() {
      hideError();
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('googleProfileForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
    }

    function showGoogleProfileForm(profile, setupToken) {
      hideError();
      googleSetupToken = setupToken;
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('googleProfileForm').style.display = 'block';
      document.getElementById('googleProfileName').value = profile?.name || '';
      document.getElementById('googleProfileEmail').value = profile?.email || '';
    }

    function getGoogleApi() {
      return window.google?.accounts?.id || null;
    }

    async function handleGoogleCredential(credential) {
      hideError();
      const res = await API.googleAuth(credential);
      if (!res || res.error) {
        showError(res?.error || '구글 로그인에 실패했습니다.');
        return;
      }
      if (res.requiresProfile) {
        showGoogleProfileForm(res.profile, res.setupToken);
        return;
      }
      API.setUser(res.user);
      window.location.href = 'calendar.html';
    }

    function renderGoogleLoginIfNeeded() {
      if (!googleClientId || googleButtonRendered) return;

      const api = getGoogleApi();
      if (!api) {
        window.setTimeout(renderGoogleLoginIfNeeded, 200);
        return;
      }

      document.getElementById('googleDivider').style.display = 'block';
      document.getElementById('googleLoginBox').style.display = 'block';
      document.getElementById('googleDomainHint').style.display = 'block';
      api.initialize({
        client_id: googleClientId,
        callback: async (response) => {
          if (!response?.credential) {
            showError('구글 인증 결과를 가져오지 못했습니다.');
            return;
          }
          await handleGoogleCredential(response.credential);
        },
        use_fedcm_for_prompt: true
      });
      api.renderButton(
        document.getElementById('googleLoginButton'),
        {
          theme: 'outline',
          size: 'large',
          width: 340,
          text: 'signin_with',
          shape: 'rectangular'
        }
      );
      googleButtonRendered = true;
    }

    function getTurnstileApi() {
      return window.turnstile || null;
    }

    function resetTurnstile() {
      const api = getTurnstileApi();
      if (!api || turnstileWidgetId === null) return;
      api.reset(turnstileWidgetId);
    }

    function renderTurnstileIfNeeded() {
      const wrap = document.getElementById('turnstileWrap');
      if (!turnstileSiteKey || !wrap) return;

      wrap.style.display = 'flex';
      if (turnstileWidgetId !== null) return;

      const api = getTurnstileApi();
      if (!api) {
        window.setTimeout(renderTurnstileIfNeeded, 200);
        return;
      }

      turnstileWidgetId = api.render('#turnstileWidget', {
        sitekey: turnstileSiteKey,
        theme: 'light'
      });
    }

    async function loadPublicConfig() {
      const config = await API.publicConfig();
      if (config && config.turnstileSiteKey) {
        turnstileSiteKey = config.turnstileSiteKey;
        if (document.getElementById('registerForm').style.display !== 'none') {
          renderTurnstileIfNeeded();
        }
      }
      if (config && config.googleClientId) {
        googleClientId = config.googleClientId;
        renderGoogleLoginIfNeeded();
      }
    }

    document.getElementById('goToRegister').addEventListener('click', () => {
      showRegisterForm();
    });

    document.getElementById('goToLogin').addEventListener('click', () => {
      showLoginForm();
    });

    document.getElementById('cancelGoogleSetup').addEventListener('click', () => {
      googleSetupToken = null;
      showLoginForm();
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      hideError();
      const name = document.getElementById('loginName').value.trim();
      const password = document.getElementById('loginPassword').value;
      if (!name || !password) { showError('이름과 비밀번호를 입력해주세요.'); return; }
      const res = await API.login(name, password);
      if (!res || res.error) { showError(res?.error || '서버 연결에 실패했습니다.'); return; }
      API.setUser(res.user);
      window.location.href = 'calendar.html';
    });

    document.getElementById('registerBtn').addEventListener('click', async () => {
      hideError();
      const password = document.getElementById('regPassword').value;
      const passwordConfirm = document.getElementById('regPasswordConfirm').value;
      const data = {
        name: document.getElementById('regName').value.trim(),
        password,
        grade: parseInt(document.getElementById('regGrade').value),
        class_number: parseInt(document.getElementById('regClass').value)
      };
      if (!data.name || !data.password || !passwordConfirm) { showError('모든 필드를 입력해주세요.'); return; }
      if (data.password.length < 8) { showError('비밀번호는 8자 이상 입력해주세요.'); return; }
      if (data.password !== passwordConfirm) { showError('비밀번호 확인이 일치하지 않습니다.'); return; }
      if (turnstileSiteKey) {
        const api = getTurnstileApi();
        const token = api && turnstileWidgetId !== null ? api.getResponse(turnstileWidgetId) : '';
        if (!token) { showError('캡차 확인을 완료해주세요.'); return; }
        data.turnstileToken = token;
      }
      const res = await API.register(data);
      if (!res || res.error) {
        resetTurnstile();
        showError(res?.error || '서버 연결에 실패했습니다.');
        return;
      }
      API.setUser(res.user);
      window.location.href = 'calendar.html';
    });

    document.getElementById('googleProfileBtn').addEventListener('click', async () => {
      hideError();
      if (!googleSetupToken) {
        showError('구글 가입 정보가 만료되었습니다. 다시 로그인해주세요.');
        showLoginForm();
        return;
      }

      const payload = {
        setupToken: googleSetupToken,
        grade: parseInt(document.getElementById('googleGrade').value, 10),
        class_number: parseInt(document.getElementById('googleClass').value, 10)
      };
      const res = await API.googleRegister(payload);
      if (!res || res.error) {
        showError(res?.error || '구글 가입을 완료하지 못했습니다.');
        return;
      }
      API.setUser(res.user);
      window.location.href = 'calendar.html';
    });

    document.querySelectorAll('#loginName, #loginPassword').forEach(el => {
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
    });
    document.querySelectorAll('#regName, #regPassword, #regPasswordConfirm').forEach(el => {
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('registerBtn').click(); });
    });

    API.me().then(data => {
      if (data && data.user_id) {
        API.setUser({ id: data.user_id, name: data.name, grade: data.grade, class_number: data.class_number, profile_image_url: data.profile_image_url, is_alarm_enabled: data.is_alarm_enabled, is_admin: data.is_admin });
        window.location.href = 'calendar.html';
      }
    }).catch(() => {});

    loadPublicConfig().catch(() => {});
  </script>
</body>
</html>
