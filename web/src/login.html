<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 알리미 - 로그인</title>
  <script src="js/theme-init.js?v=1"></script>
  <link rel="stylesheet" href="css/style.css?v=26">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">
  <div class="app-shell">
  <div class="auth-page">
    <div class="auth-box">
      <h1>과제 알리미</h1>
      <p>구글 학교 계정으로 로그인하세요.</p>

      <div class="auth-error" id="authError"></div>

      <div id="loginForm">
        <div class="auth-divider" id="googleDivider" style="display:none"><span>Google</span></div>
        <div id="googleLoginBox" style="display:none">
          <div id="googleLoginButton" class="google-login-button"></div>
          <div class="auth-link" id="googleDomainHint" style="display:none; margin-top:10px;">@bssm.hs.kr 학교 계정만 사용할 수 있습니다.</div>
        </div>
      </div>

      <div id="googleProfileForm" style="display:none">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="googleProfileName" readonly>
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="text" id="googleProfileEmail" readonly>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>학년</label>
            <select id="googleGrade">
              <option value="1">1학년</option>
              <option value="2">2학년</option>
              <option value="3">3학년</option>
            </select>
          </div>
          <div class="form-group">
            <label>반</label>
            <select id="googleClass">
              <option value="1">1반</option>
              <option value="2">2반</option>
              <option value="3">3반</option>
              <option value="4">4반</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%" id="googleProfileBtn">시작하기</button>
        <div class="auth-link"><a id="cancelGoogleSetup">다시 로그인 선택으로 돌아가기</a></div>
      </div>
    </div>
  </div>
  </div>

  <script src="js/api.js?v=14"></script>
  <script src="js/login.js?v=1"></script>
</body>
</html>
