<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 알리미 - 설정</title>
  <script src="js/theme-init.js?v=1"></script>
  <link rel="stylesheet" href="css/style.css?v=27">
</head>
<body>
  <div class="app-shell">
  <header class="app-header">
    <h1 data-nav="calendar.html">과제 알리미</h1>
    <nav>
      <a href="calendar.html">날짜화면</a>
      <a href="register.html">과제등록</a>
      <a href="messages.html">메세지</a>
      <a href="chatbot.html">AI 챗봇</a>
      <a href="settings.html" class="active">설정</a>
    </nav>
    <div class="user-info">
      <div class="notification-area">
        <button class="notification-btn" id="notificationBtn" type="button">알림 <span class="notification-badge" id="notificationBadge">0</span></button>
        <div class="notification-panel" id="notificationPanel">
          <div class="notification-panel-header">
            <strong>최근 알림</strong>
            <button class="notification-refresh-btn" id="notificationRefreshBtn" type="button">새로고침</button>
          </div>
          <div class="notification-list" id="notificationList">
            <div class="notification-empty">불러오는 중...</div>
          </div>
        </div>
      </div>
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" type="button" data-logout>로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="settings-section">
        <h3>프로필</h3>
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
          <div class="profile-avatar" id="profileAvatar">?</div>
          <div style="flex:1">
              <div class="form-group">
                <label>이름</label>
                <input type="text" id="settingName" class="readonly-input" placeholder="이름" disabled>
              </div>
            <div class="form-group">
              <label>소속</label>
              <input type="text" id="settingClass" class="readonly-input" disabled>
            </div>
          </div>
        </div>
          <p class="settings-help-text">이름은 구글 계정 기준으로 자동 표시되며 앱 안에서 변경할 수 없습니다.</p>
      </div>

      <div class="settings-section">
        <h3>알림 설정</h3>
        <div class="toggle-row">
          <label>과제 알림</label>
          <div class="toggle on" id="alarmToggle"></div>
        </div>
        <p class="settings-help-text">새 과제 등록 및 마감일 알림을 받습니다.</p>
      </div>

      <div class="settings-section">
        <h3>화면 설정</h3>
        <div class="theme-mode-row">
          <label for="themeModeSelect">화면 모드</label>
          <select id="themeModeSelect" class="theme-mode-select">
            <option value="system">시스템</option>
            <option value="dark">다크모드</option>
            <option value="light">라이트모드</option>
          </select>
        </div>
        <p class="settings-help-text" id="themeModeHelp">시스템 설정을 따라갑니다.</p>
      </div>

      <div class="settings-section">
        <h3>계정</h3>
        <button class="btn btn-secondary" type="button" data-logout>로그아웃</button>
      </div>

      <div class="settings-section admin-section" id="adminAssignmentSection" style="display:none">
        <button class="admin-accordion-toggle open" type="button" data-target="adminAssignmentPanel">
          <span>과제 관리</span>
          <span class="admin-accordion-arrow">▾</span>
        </button>
        <div class="admin-accordion-panel show" id="adminAssignmentPanel">
          <p class="admin-section-help">학년/반별 과제를 드롭다운으로 골라 확인하고 삭제할 수 있습니다.</p>
          <div class="admin-filter-bar show admin-panel-filter">
            <strong>과제 범위</strong>
            <select id="adminSettingsAssignmentGrade"></select>
            <select id="adminSettingsAssignmentClass"></select>
          </div>
          <div id="adminAssignmentList"></div>
          <div class="admin-pagination" id="adminAssignmentPager"></div>
        </div>
      </div>

      <div class="settings-section admin-section" id="adminMessageSection" style="display:none">
        <button class="admin-accordion-toggle" type="button" data-target="adminMessagePanel">
          <span>메세지 관리</span>
          <span class="admin-accordion-arrow">▾</span>
        </button>
        <div class="admin-accordion-panel" id="adminMessagePanel">
          <p class="admin-section-help">학년 공지와 반 공지를 나눠서 보고 삭제할 수 있습니다.</p>
          <div class="admin-filter-bar show admin-panel-filter">
            <strong>공지 범위</strong>
            <select id="adminSettingsMessageType">
              <option value="grade">학년 공지</option>
              <option value="class">반 공지</option>
            </select>
            <select id="adminSettingsMessageGrade"></select>
            <select id="adminSettingsMessageClass"></select>
          </div>
          <div id="adminMessageList"></div>
          <div class="admin-pagination" id="adminMessagePager"></div>
        </div>
      </div>

      <div class="settings-section admin-section" id="adminUserSection" style="display:none">
        <button class="admin-accordion-toggle" type="button" data-target="adminUserPanel">
          <span>유저 관리</span>
          <span class="admin-accordion-arrow">▾</span>
        </button>
          <div class="admin-accordion-panel" id="adminUserPanel">
            <p class="admin-section-help">사용자 이름은 고정되며 소속 학년/반만 수정하거나 계정을 삭제할 수 있습니다.</p>
          <div id="adminUserList"></div>
          <div class="admin-pagination" id="adminUserPager"></div>
        </div>
      </div>
    </div>
  </div>
  </div>

    <script src="js/api.js?v=16"></script>
  <script src="js/app-shell.js?v=1"></script>
    <script src="js/settings.js?v=3"></script>
</body>
</html>
