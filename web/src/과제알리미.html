<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내 것 - 과제 알리미</title>
  <link rel="stylesheet" href="과제알리미.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>과제 알리미</h1>
      <p>과제를 놓치지 말고 확인하세요!</p>
    </header>

    <div class="class-selector">
      <label>학년</label>
      <select id="gradeSelect">
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
      </select>
      <label>반</label>
      <select id="classSelect">
        <option value="1">1반</option>
        <option value="2">2반</option>
        <option value="3">3반</option>
        <option value="4">4반</option>
      </select>
    </div>

    <div class="stats">
      <div class="stat-card urgent"><div class="num" id="urgentCount">0</div><div class="label">긴급</div></div>
      <div class="stat-card normal"><div class="num" id="normalCount">0</div><div class="label">진행중</div></div>
      <div class="stat-card done"><div class="num" id="doneCount">0</div><div class="label">완료</div></div>
    </div>

    <div class="calendar-nav">
      <button id="prevMonth">&lt; 이전</button>
      <h2 id="monthTitle"></h2>
      <button id="nextMonth">다음 &gt;</button>
    </div>

    <div class="calendar">
      <div class="calendar-header">
        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
      </div>
      <div class="calendar-body" id="calendarBody"></div>
    </div>

    <div class="add-task">
      <h3>새 과제 추가</h3>
      <div class="form-row">
        <input type="text" id="taskTitle" placeholder="과제 이름">
        <input type="date" id="taskDate">
      </div>
      <div class="form-row">
        <select id="taskPriority">
          <option value="normal">보통</option>
          <option value="urgent">긴급</option>
        </select>
        <input type="text" id="taskMemo" placeholder="메모 (선택)">
      </div>
      <button class="btn-add" id="addBtn">추가하기</button>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <div class="task-list" id="taskList"></div>
      <button class="btn-close" id="closeModal">닫기</button>
    </div>
  </div>
  <script src="과제알리미.js"></script>
</body>
</html>
