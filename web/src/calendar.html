<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 알리미 - 날짜화면</title>
  <script src="js/theme-init.js?v=1"></script>
  <link rel="stylesheet" href="css/style.css?v=26">
</head>
<body>
  <div class="app-shell">
  <header class="app-header">
    <h1 data-nav="calendar.html">과제 알리미</h1>
    <nav>
      <a href="calendar.html" class="active">날짜화면</a>
      <a href="register.html">과제등록</a>
      <a href="messages.html">메세지</a>
      <a href="settings.html">설정</a>
    </nav>
    <div class="user-info">
      <div class="notification-area">
        <button class="notification-btn" id="notificationBtn" type="button">알림 <span class="notification-badge" id="notificationBadge">0</span></button>
        <div class="notification-panel" id="notificationPanel">
          <div class="notification-panel-header">
            <strong>최근 알림</strong>
            <button class="notification-refresh-btn" id="notificationRefreshBtn" type="button">새로고침</button>
          </div>
          <div class="notification-list" id="notificationList">
            <div class="notification-empty">불러오는 중...</div>
          </div>
        </div>
      </div>
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" type="button" data-logout>로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="admin-filter-bar" id="adminCalendarFilter">
      <strong>조회 범위</strong>
      <select id="adminGradeFilter"></select>
      <select id="adminClassFilter"></select>
    </div>

    <div class="stats">
      <div class="stat-card urgent"><div class="num" id="urgentCount">0</div><div class="label" id="urgentLabel">긴급</div></div>
      <div class="stat-card normal"><div class="num" id="normalCount">0</div><div class="label" id="normalLabel">진행중</div></div>
      <div class="stat-card done"><div class="num" id="doneCount">0</div><div class="label" id="doneLabel">제출함</div></div>
    </div>

    <div class="calendar-nav">
      <button id="prevMonth">&lt; 이전</button>
      <div class="calendar-title">
        <h2 id="monthTitle"></h2>
        <div id="classScope" class="scope-text"></div>
      </div>
      <button id="nextMonth">다음 &gt;</button>
    </div>

    <div class="calendar">
      <div class="calendar-header">
        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
      </div>
      <div class="calendar-body" id="calendarBody"></div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <div id="taskList"></div>
      <button class="btn btn-secondary btn-sm" style="margin-top:15px;width:100%" id="closeModal">닫기</button>
    </div>
  </div>
  </div>

  <script src="js/api.js?v=14"></script>
  <script src="js/app-shell.js?v=1"></script>
  <script src="js/calendar.js?v=1"></script>
</body>
</html>
