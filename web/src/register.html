<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과제 알리미 - 과제 등록</title>
  <script src="js/theme-init.js?v=1"></script>
  <link rel="stylesheet" href="css/style.css?v=26">
</head>
<body>
  <div class="app-shell">
  <header class="app-header">
    <h1 data-nav="calendar.html">과제 알리미</h1>
    <nav>
      <a href="calendar.html">날짜화면</a>
      <a href="register.html" class="active">과제등록</a>
      <a href="messages.html">메세지</a>
      <a href="settings.html">설정</a>
    </nav>
    <div class="user-info">
      <div class="notification-area">
        <button class="notification-btn" id="notificationBtn" type="button">알림 <span class="notification-badge" id="notificationBadge">0</span></button>
        <div class="notification-panel" id="notificationPanel">
          <div class="notification-panel-header">
            <strong>최근 알림</strong>
            <button class="notification-refresh-btn" id="notificationRefreshBtn" type="button">새로고침</button>
          </div>
          <div class="notification-list" id="notificationList">
            <div class="notification-empty">불러오는 중...</div>
          </div>
        </div>
      </div>
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" type="button" data-logout>로그아웃</button>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <h3 id="assignmentFormTitle">새 과제 등록</h3>
      <form id="assignmentForm" data-prevent-submit="true">
        <div class="form-group">
          <label>과제명</label>
          <input type="text" id="taskTitle" placeholder="과제 이름을 입력하세요" required>
        </div>
        <div class="form-group">
          <label>상세 내용</label>
          <textarea id="taskContent" placeholder="과제에 대한 설명을 입력하세요 (선택)"></textarea>
          <div class="content-helper">
            <div class="content-helper-actions">
              <button class="btn btn-secondary btn-sm" type="button" id="insertImageBtn">이미지 추가</button>
            </div>
            <input type="file" id="taskImageInput" accept="image/png,image/jpeg,image/webp,image/gif" multiple hidden>
          </div>
          <div class="content-preview" id="taskContentPreviewWrap" style="display:none">
            <div class="content-preview-label">미리보기</div>
            <div class="detail" id="taskContentPreview"></div>
          </div>
        </div>
        <div class="form-group">
          <label>마감일</label>
          <input type="date" id="taskDate" required>
        </div>
        <div class="form-group">
          <label>등록 대상</label>
          <input type="text" id="targetScope" readonly>
        </div>
        <div class="form-row" id="adminTargetRow" style="display:none">
          <div class="form-group">
            <label>대상 학년</label>
            <select id="adminTargetGrade"></select>
          </div>
          <div class="form-group">
            <label>대상 반</label>
            <select id="adminTargetClass"></select>
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" type="button" id="saveBtn">등록하기</button>
          <button class="btn btn-secondary" type="button" id="cancelEditBtn" style="display:none">수정 취소</button>
          <button class="btn btn-secondary" type="button" data-nav="calendar.html">취소</button>
        </div>
      </form>
    </div>

    <div class="admin-filter-bar" id="adminAssignmentFilter">
      <strong>조회 범위</strong>
      <select id="adminAssignmentGradeFilter"></select>
      <select id="adminAssignmentClassFilter"></select>
    </div>

    <div class="card">
      <h3 id="assignmentListTitle">내가 등록한 과제</h3>
      <div id="myAssignments"><div class="empty-state">등록한 과제가 없습니다.</div></div>
    </div>
  </div>
  </div>

  <script src="js/api.js?v=14"></script>
  <script src="js/app-shell.js?v=1"></script>
  <script src="js/register.js?v=1"></script>
</body>
</html>
